name: search_nodes

on:
  workflow_dispatch: # 手动运行
  push:
    paths:
      - 'search_nodes.py'
      - '.github/workflows/search_nodes.yml'
  schedule:
    # 每天北京时间 04:00 自动运行 (对应 UTC 20:00)
    - cron: '0 20 * * *'

jobs:
  execute-task:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests

      - name: Run Script
        env:
          # 将名为 BOT 的 Secret 传入环境变量
          BOT: ${{ secrets.BOT }}
        run: python search_nodes.py

      - name: Commit and Push
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Action"
          git add results/nodes.txt
          # 使用上海时间作为提交备注
          TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
          git commit -m "自动更新节点 - $TIMESTAMP" || exit 0
          git push
