name: search_nodes

on:
  workflow_dispatch: # 支持手动点击运行
  push:
    paths:
      - 'search_nodes.py'  # 当脚本文件变动时触发
      - '.github/workflows/search_nodes.yml' # 当工作流文件变动时触发
  schedule:
    # 每天北京时间 08:00 运行一次 (对应 UTC 00:00)
    - cron: '0 0 * * *'

jobs:
  run_collector:
    runs-on: ubuntu-latest
    # 必须赋予写权限，否则无法 git push
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Execute Node Search
        env:
          # 将你仓库 Secret 中的 BOT 映射为脚本所需的环境变量
          BOT: ${{ secrets.BOT }}
        run: python search_nodes.py

      - name: Commit and Push Results
        run: |
          # 配置 Git 机器人信息
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # 检查是否有文件更新
          git add results/nodes.txt  results/stats.csv
          if git diff --cached --quiet; then
            echo "没有发现新节点或数据变动，跳过提交。"
          else
            # 使用上海时间作为提交信息
            TIMESTAMP=$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')
            git commit -m "Update nodes: $TIMESTAMP"
            git push
          fi
