name: v2board_scanner

on:
  workflow_dispatch: # 支持手动运行
  push:
    paths:
      - 'v2board_scanner.py'
      - '.github/workflows/v2board_scanner.yml'

jobs:
  scan:
    runs-on: ubuntu-latest
    # 限制运行时间，防止 IP 段过大导致超时（/16 段建议保持在 6 小时内）
    timeout-minutes: 360 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install aiohttp pandas

      - name: Execution
        run: python v2board_scanner.py
        env:
          TZ: Asia/Shanghai

      - name: Save to Repository
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add v2board_results.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update scan results: $(date +'%Y-%m-%d %H:%M:%S')" && git push)
